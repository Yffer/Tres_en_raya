<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Particle Gesture System</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:15px;
left:15px;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:10px;
color:white;
}

button,input{
margin-top:8px;
width:150px;
}

</style>
</head>

<body>

<div id="ui">

<label>Color partículas</label><br>
<input type="color" id="colorPicker" value="#00ffff"><br>

<button onclick="fullscreen()">Pantalla completa</button>

</div>

<video id="video" autoplay playsinline style="display:none"></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

/* ESCENA THREEJS */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 5

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)


/* PARTICULAS */

const particleCount = 8000

const geometry = new THREE.BufferGeometry()

const positions = new Float32Array(particleCount*3)

for(let i=0;i<particleCount*3;i++){

positions[i] = (Math.random()-0.5)*4

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
size:0.03,
color:0x00ffff
})

const particles = new THREE.Points(geometry,material)

scene.add(particles)


/* COLOR */

document.getElementById("colorPicker")
.addEventListener("input",e=>{

material.color.set(e.target.value)

})


/* ANIMACION */

let scale = 1

function animate(){

requestAnimationFrame(animate)

particles.rotation.y += 0.002

particles.scale.set(scale,scale,scale)

renderer.render(scene,camera)

}

animate()


/* FULLSCREEN */

function fullscreen(){

document.body.requestFullscreen()

}


/* CAMARA */

const video = document.getElementById("video")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream
})
.catch(err=>{
console.log("Error cámara:",err)
})


/* MEDIAPIPE HANDS */

const hands = new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6
})

hands.onResults(results=>{

if(results.multiHandLandmarks && results.multiHandLandmarks.length > 0){

const lm = results.multiHandLandmarks[0]

// pulgar
const thumb = lm[4]

// indice
const index = lm[8]

// distancia
const dx = thumb.x - index.x
const dy = thumb.y - index.y

const distance = Math.sqrt(dx*dx + dy*dy)

scale = 0.5 + distance * 20

console.log("Distancia gesto:",distance)

}

})


/* LOOP CAMARA */

const cam = new Camera(video,{
onFrame: async ()=>{
await hands.send({image:video})
},
width:640,
height:480
})

cam.start()


/* RESIZE */

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
