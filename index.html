<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gesture Particle System</title>

<style>

body{
margin:0;
overflow:hidden;
background:#050505;
font-family:Arial;
}

#ui{
position:absolute;
top:15px;
left:15px;
width:200px;
padding:15px;
background:rgba(0,0,0,0.5);
border-radius:12px;
color:white;
backdrop-filter:blur(12px);
}

select,input,button{
width:100%;
margin-top:8px;
padding:6px;
border:none;
border-radius:6px;
}

button{
cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">

<label>Color partículas</label>
<input type="color" id="colorPicker" value="#00ffff">

<label>Patrón</label>
<select id="pattern">
<option value="sphere">Sphere</option>
<option value="galaxy">Galaxy</option>
<option value="heart">Heart</option>
<option value="spiral">Spiral</option>
<option value="cube">Cube</option>
</select>

<button onclick="fullscreen()">Fullscreen</button>

</div>

<video id="video" autoplay playsinline style="display:none"></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

/* THREEJS SCENE */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 6

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)


/* PARTICLES */

const PARTICLES = 20000

let geometry = new THREE.BufferGeometry()
let positions = new Float32Array(PARTICLES*3)

function generatePattern(type){

for(let i=0;i<PARTICLES;i++){

let x,y,z

if(type==="sphere"){

let r = Math.random()*3
let theta = Math.random()*Math.PI*2
let phi = Math.acos((Math.random()*2)-1)

x = r*Math.sin(phi)*Math.cos(theta)
y = r*Math.sin(phi)*Math.sin(theta)
z = r*Math.cos(phi)

}

if(type==="galaxy"){

let r = Math.random()*3
let angle = r*3

x = Math.cos(angle)*r
y = (Math.random()-0.5)*0.5
z = Math.sin(angle)*r

}

if(type==="heart"){

let t = Math.random()*Math.PI*2

x = 16*Math.pow(Math.sin(t),3)/10
y = (13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/10
z = (Math.random()-0.5)

}

if(type==="spiral"){

let t = i*0.05

x = Math.cos(t)*t*0.03
y = (Math.random()-0.5)*0.2
z = Math.sin(t)*t*0.03

}

if(type==="cube"){

x = (Math.random()-0.5)*4
y = (Math.random()-0.5)*4
z = (Math.random()-0.5)*4

}

positions[i*3] = x
positions[i*3+1] = y
positions[i*3+2] = z

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

geometry.attributes.position.needsUpdate = true

}

generatePattern("sphere")

const material = new THREE.PointsMaterial({
size:0.03,
color:0x00ffff
})

const particles = new THREE.Points(geometry,material)
scene.add(particles)


/* COLOR */

document.getElementById("colorPicker")
.addEventListener("input",e=>{
material.color.set(e.target.value)
})


/* PATTERN */

document.getElementById("pattern")
.addEventListener("change",e=>{
generatePattern(e.target.value)
})


/* ANIMATION */

let scale = 1
let disperse = 0

function animate(){

requestAnimationFrame(animate)

particles.rotation.y += 0.002

particles.scale.set(scale,scale,scale)

renderer.render(scene,camera)

}

animate()


/* FULLSCREEN */

function fullscreen(){

document.body.requestFullscreen()

}


/* CAMERA */

const video = document.getElementById("video")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream
})


/* MEDIAPIPE */

const hands = new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6
})


hands.onResults(results=>{

if(results.multiHandLandmarks && results.multiHandLandmarks.length>0){

const lm = results.multiHandLandmarks[0]

const thumb = lm[4]
const index = lm[8]

const dx = thumb.x-index.x
const dy = thumb.y-index.y

const dist = Math.sqrt(dx*dx+dy*dy)

/* SCALE */

scale = 0.5 + dist*15

/* DISPERSION */

particles.rotation.x = dist*2
particles.rotation.z = dist*2

}

})


const cam = new Camera(video,{
onFrame: async ()=>{
await hands.send({image:video})
},
width:640,
height:480
})

cam.start()


/* RESIZE */

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
