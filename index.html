<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Advanced 3D Particle Gesture System</title>

<style>

body{
margin:0;
overflow:hidden;
background:#050505;
font-family:Arial;
}

#ui{
position:absolute;
top:15px;
left:15px;
padding:15px;
border-radius:12px;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);
color:white;
width:180px;
}

label{
font-size:13px;
opacity:0.8;
}

select,input,button{
width:100%;
margin-top:6px;
margin-bottom:10px;
padding:6px;
border-radius:6px;
border:none;
}

button{
cursor:pointer;
background:#ffffff;
}

</style>

</head>

<body>

<div id="ui">

<label>Color</label>
<input type="color" id="colorPicker" value="#ffffff">

<label>Patrón</label>
<select id="pattern">

<option value="sphere">Sphere</option>
<option value="galaxy">Galaxy</option>
<option value="heart">Heart</option>
<option value="explosion">Explosion</option>

</select>

<button onclick="fullscreen()">Fullscreen</button>

</div>

<video id="video" autoplay playsinline style="display:none"></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

// escena

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 6

const renderer = new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)


// partículas

const particleCount = 5000

let geometry = new THREE.BufferGeometry()

let positions = new Float32Array(particleCount*3)

function generatePattern(type){

for(let i=0;i<particleCount;i++){

let x,y,z

if(type==="sphere"){

let r = 2*Math.random()

let theta = Math.random()*Math.PI*2
let phi = Math.acos((Math.random()*2)-1)

x = r*Math.sin(phi)*Math.cos(theta)
y = r*Math.sin(phi)*Math.sin(theta)
z = r*Math.cos(phi)

}

if(type==="galaxy"){

let angle = i*0.1
let radius = Math.random()*2

x = Math.cos(angle)*radius
y = (Math.random()-0.5)*0.5
z = Math.sin(angle)*radius

}

if(type==="heart"){

let t = Math.random()*Math.PI*2

x = 0.16*Math.pow(Math.sin(t),3)*10
y = (0.13*Math.cos(t)-0.05*Math.cos(2*t)-0.02*Math.cos(3*t)-0.01*Math.cos(4*t))*10
z = (Math.random()-0.5)*0.5

}

if(type==="explosion"){

x = (Math.random()-0.5)*6
y = (Math.random()-0.5)*6
z = (Math.random()-0.5)*6

}

positions[i*3] = x
positions[i*3+1] = y
positions[i*3+2] = z

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

}

generatePattern("sphere")

const material = new THREE.PointsMaterial({
size:0.03,
color:0xffffff
})

const particles = new THREE.Points(geometry,material)

scene.add(particles)


// color

document.getElementById("colorPicker")
.addEventListener("input",e=>{
material.color.set(e.target.value)
})


// patrones

document.getElementById("pattern")
.addEventListener("change",e=>{
generatePattern(e.target.value)
})


// animación

let scale = 1

function animate(){

requestAnimationFrame(animate)

particles.scale.set(scale,scale,scale)

particles.rotation.y += 0.002

renderer.render(scene,camera)

}

animate()


// fullscreen

function fullscreen(){

document.body.requestFullscreen()

}


// GESTOS

const video = document.getElementById("video")

const hands = new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
})

hands.onResults(results=>{

if(results.multiHandLandmarks.length){

const lm = results.multiHandLandmarks[0]

const dx = lm[4].x - lm[8].x
const dy = lm[4].y - lm[8].y

const distance = Math.sqrt(dx*dx + dy*dy)

scale = 1 + distance*5

}

})

const cam = new Camera(video,{
onFrame: async ()=>{
await hands.send({image:video})
},
width:640,
height:480
})

cam.start()


// resize

window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(
window.innerWidth,
window.innerHeight
)

})

</script>

</body>
</html>
